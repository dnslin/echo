openapi: 3.1.0
info:
  title: echo API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: 健康检查
      operationId: getHealthz
      responses:
        "200":
          description: API 服务健康
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - ok
              examples:
                healthy:
                  value:
                    status: ok
