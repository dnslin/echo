# Wails project configuration for the echo desktop scaffold.
version: '3'

info:
  companyName: "echo"
  productName: "echo"
  productIdentifier: "app.echo.desktop"
  description: "Lightweight game voice desktop app bootstrap"
  copyright: "(c) 2026, echo"
  comments: "MVP friend test desktop bootstrap"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations:

other: []
